<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Story Begins</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
      background: #1a1200;
    }

    /* Gold bokeh canvas */
    #bokeh-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 10;
      transition: opacity 0.8s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }

    .splash-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 46px;
      font-weight: 300;
      font-style: italic;
      color: #fff8e7;
      text-align: center;
      line-height: 1.2;
      text-shadow: 0 2px 24px rgba(212,175,55,0.5);
    }
    .splash-sub {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #d4af37;
    }
    .open-btn {
      margin-top: 8px;
      padding: 14px 40px;
      background: transparent;
      border: 1px solid #d4af37;
      color: #fff8e7;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    .open-btn:hover { background: #d4af37; color: #1a1200; }

    .heart {
      font-size: 24px;
      color: #d4af37;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    #main { display: none; animation: fadeIn 1s ease forwards; position: relative; z-index: 5; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(20, 14, 0, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(212,175,55,0.35);
      padding: 48px 56px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      position: relative;
      box-shadow: 0 8px 40px rgba(212,175,55,0.12);
    }
    .card::before, .card::after,
    .card .corner-bl, .card .corner-br {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #d4af37;
      border-style: solid;
    }
    .card::before { top: 10px; left: 10px; border-width: 1.5px 0 0 1.5px; }
    .card::after  { top: 10px; right: 10px; border-width: 1.5px 1.5px 0 0; }
    .card .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 1.5px 1.5px; }
    .card .corner-br { bottom: 10px; right: 10px; border-width: 0 1.5px 1.5px 0; }

    .label-top {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #d4af37;
      margin-bottom: 14px;
    }
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      font-style: italic;
      color: #fff8e7;
      line-height: 1.2;
      margin-bottom: 6px;
      text-shadow: 0 1px 12px rgba(212,175,55,0.3);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px auto;
      width: 80%;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(212,175,55,0.4);
    }
    .divider span { font-size: 14px; color: #d4af37; }

    #qrcode { display: flex; justify-content: center; margin: 0 auto 20px; }
    #qrcode canvas, #qrcode img { border: 6px solid rgba(255,248,231,0.05); outline: 1px solid rgba(212,175,55,0.3); border-radius: 2px; }

    .scan-text {
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(212,175,55,0.7);
      margin-top: 4px;
    }

    #music-hint-tooltip {
      position: fixed;
      bottom: 68px;
      right: 16px;
      background: rgba(20,15,0,0.95);
      border: 1px solid rgba(212,175,55,0.5);
      color: #d4af37;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 8px 12px;
      border-radius: 2px;
      z-index: 200;
      white-space: nowrap;
      animation: fadeInOut 4s ease 1.5s both;
      pointer-events: none;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; } 15% { opacity: 1; } 75% { opacity: 1; } 100% { opacity: 0; }
    }
    #music-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #d4af37;
      background: rgba(20,14,0,0.6);
      color: #d4af37;
      font-size: 16px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(212,175,55,0.2);
      transition: background 0.2s;
      z-index: 20;
    }
    #music-toggle:hover { background: rgba(212,175,55,0.2); }

    /* ── RSVP ── */
    .rsvp-section {
      margin-top: 24px;
      border-top: 1px solid rgba(212,175,55,0.2);
      padding-top: 20px;
    }
    .rsvp-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #d4af37;
      margin-bottom: 14px;
    }
    .rsvp-input {
      width: 100%;
      background: rgba(255,248,231,0.05);
      border: 1px solid rgba(212,175,55,0.3);
      color: #fff8e7;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      padding: 10px 14px;
      margin-bottom: 12px;
      outline: none;
      text-align: center;
      letter-spacing: 1px;
    }
    .rsvp-input::placeholder { color: rgba(212,175,55,0.4); }
    .rsvp-input:focus { border-color: #d4af37; }
    .rsvp-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .rsvp-toggle button {
      flex: 1;
      padding: 9px;
      background: transparent;
      border: 1px solid rgba(212,175,55,0.3);
      color: rgba(212,175,55,0.6);
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .rsvp-toggle button.active {
      background: #d4af37;
      color: #1a1200;
      border-color: #d4af37;
    }
    .rsvp-send-row {
      display: flex;
      gap: 10px;
    }
    .rsvp-send-btn {
      flex: 1;
      padding: 11px 8px;
      background: transparent;
      border: 1px solid rgba(212,175,55,0.4);
      color: #d4af37;
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .rsvp-send-btn:hover { background: #d4af37; color: #1a1200; }
  </style>
</head>
<body>

  <canvas id="bokeh-canvas"></canvas>

  <div id="splash">
    <div class="heart">♡</div>
    <p class="splash-sub">A moment to remember</p>
    <p class="splash-title">Our Story<br>Begins</p>
    <button class="open-btn" onclick="openCard()">Open</button>
  </div>

  <div id="main">
    <div class="card">
      <div class="corner-bl"></div>
      <div class="corner-br"></div>
      <p class="label-top">A moment to remember</p>
      <h1 class="title">Our Story Begins</h1>
      <div class="divider"><span>✦</span></div>
      <div id="qrcode"></div>
      <p class="scan-text">Scan to view the card</p>
      <div class="rsvp-section">
        <p class="rsvp-label">RSVP</p>
        <input class="rsvp-input" id="rsvp-name" type="text" placeholder="Your Name" />
        <div class="rsvp-toggle">
          <button id="btn-yes" onclick="selectAttending('yes')">✓ Attending</button>
          <button id="btn-no" onclick="selectAttending('no')">✗ Not Attending</button>
        </div>
        <div class="rsvp-send-row">
          <button class="rsvp-send-btn" onclick="sendRSVP('groom')">💬 Message Groom</button>
          <button class="rsvp-send-btn" onclick="sendRSVP('bride')">💬 Message Bride</button>
        </div>
      </div>
    </div>
  </div>

  <button id="music-toggle" title="Toggle music" onclick="toggleMusic()">♪</button>
<div id="music-hint-tooltip">Tap ♪ for music</div>

  <script>
    // ── Gold Bokeh Animation ──
    const canvas = document.getElementById('bokeh-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = [
      'rgba(212,175,55,',
      'rgba(255,215,0,',
      'rgba(255,236,139,',
      'rgba(184,142,28,',
      'rgba(255,255,200,',
    ];

    const circles = Array.from({length: 60}, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: 8 + Math.random() * 60,
      alpha: 0.04 + Math.random() * 0.18,
      speed: 0.15 + Math.random() * 0.4,
      drift: (Math.random() - 0.5) * 0.3,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.005 + Math.random() * 0.015,
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Deep dark gold background
      const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      bg.addColorStop(0, '#0d0900');
      bg.addColorStop(0.5, '#1a1200');
      bg.addColorStop(1, '#0a0700');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      circles.forEach(c => {
        c.pulse += c.pulseSpeed;
        const alpha = c.alpha * (0.7 + 0.3 * Math.sin(c.pulse));

        const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
        grad.addColorStop(0, c.color + (alpha * 1.2).toFixed(3) + ')');
        grad.addColorStop(0.4, c.color + (alpha * 0.6).toFixed(3) + ')');
        grad.addColorStop(1, c.color + '0)');

        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        c.y -= c.speed;
        c.x += c.drift;

        if (c.y + c.r < 0) {
          c.y = canvas.height + c.r;
          c.x = Math.random() * canvas.width;
        }
        if (c.x < -c.r) c.x = canvas.width + c.r;
        if (c.x > canvas.width + c.r) c.x = -c.r;
      });

      requestAnimationFrame(draw);
    }
    draw();

    // ── Card & Music Logic ──
    let musicPlaying = false;
    const audio = document.getElementById('bg-music');
    const toggle = document.getElementById('music-toggle');

    function openCard() {
      audio.volume = 0.6;
      var _p = audio.play();
      if (_p !== undefined) {
        _p.then(function() { musicPlaying = true; updateToggle(); }).catch(function(e) { console.log('play blocked:', e); });
      }

      const splash = document.getElementById('splash');
      splash.classList.add('hidden');
      setTimeout(() => {
        splash.style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        toggle.style.display = 'flex';
        document.body.style.overflow = 'auto';
      }, 800);

      new QRCode(document.getElementById("qrcode"), {
        text: "https://drive.google.com/file/d/1Fxffuz8uk316y_mIhn64B14E7ozcEyIk/view?usp=drivesdk",
        width: 200,
        height: 200,
        colorDark: "#fff8e7",
        colorLight: "rgba(0,0,0,0)",
        correctLevel: QRCode.CorrectLevel.H
      });

      updateToggle();
    }

    function toggleMusic() {
      // Remove hint on first tap
      var hint = document.getElementById('music-hint-tooltip');
      if (hint) hint.style.display = 'none';
      if (musicPlaying) {
        audio.pause(); musicPlaying = false; updateToggle();
      } else {
        var _p = audio.play();
        if (_p !== undefined) {
          _p.then(function() { musicPlaying = true; updateToggle(); }).catch(function(e) { console.log('toggle blocked:', e); });
        } else { musicPlaying = true; updateToggle(); }
      }
    }

    function updateToggle() {
      toggle.textContent = musicPlaying ? '♪' : '♩';
      toggle.title = musicPlaying ? 'Pause music' : 'Play music';
    }

    // ── RSVP ──
    let attending = null;
    const groom = '919545385877';
    const bride = '919923506741';

    function selectAttending(choice) {
      attending = choice;
      document.getElementById('btn-yes').classList.toggle('active', choice === 'yes');
      document.getElementById('btn-no').classList.toggle('active', choice === 'no');
    }

    function sendRSVP(to) {
      const name = document.getElementById('rsvp-name').value.trim();
      if (!name) { alert('Please enter your name.'); return; }
      if (!attending) { alert('Please select if you are attending.'); return; }
      const status = attending === 'yes' ? 'will be attending 🎉' : 'will not be able to attend 😢';
      const msg = encodeURIComponent("Hi! I'm " + name + " and I " + status + " your wedding. 🤍");
      const number = to === 'groom' ? groom : bride;
      window.open('https://wa.me/' + number + '?text=' + msg, '_blank');
    }
  </script>
</body>
</html>
